JFIELD_ALIAS_DESC="Alias akan digunakan dalam URL SEF. Biarkan kosong dan Joomla! akan mengisinya dengan nilai standar dari judul. Nilai ini bergantung pada pengaturan SEO (Konfigurasi Global->Situs). <br />Gunakan Unicode yang akan menghasilkan alias dengan UTF-8. Anda juga bisa secara manual memasukkan karakter utf8 apapun. Spasi dan beberapa karakter terlarang akan digantikan dengan tanda-penghubung.<br />Ketika menggunakan transliterasi standar yang akan menghasilkan alias dalam huruf kecil dan dengan strip bukannya spasi. Anda bisa memasukkan Alias secara manual. Gunakan huruf kecil dan tanda penghubung (-). Spasi atau garis bawah tidak diizinkan. Nilai standar adalah tanggal dan waktu bila judul ditulis dengan menggunakan huruf non-latin ."
