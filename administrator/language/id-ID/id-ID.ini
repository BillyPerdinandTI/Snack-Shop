JGLOBAL_FILTER_TYPE_DESC="<p>Pencekalan mengizinkan semua tag dan atribut kecuali yang ada didalam pencekalan.<br /><strong>--</strong> Pencekalan Standar memasukkan tag sebagai berikut: 'applet', 'body', 'bgsound', 'base', 'basefont', 'embed', 'frame', 'frameset', 'head', 'html', 'id', 'iframe', 'ilayer', 'layer', 'link', 'meta', 'name', 'object', 'script', 'style', 'title', 'xml'<br /><strong>--</strong> Pencekalan Standar memasukkan atribut sebagai berkut:<br />'action', 'background', 'codebase', 'dynsrc', 'lowsrc'<br /><strong>--</strong> Anda bisa menambahkan tag atau atribut tambahan dalam pencekalan dengan cara menambahkannya pada kolom Tag Penyaring dan Atribut Penyaring, memisahkan tiap tag atau atribut dengan spasi atau koma.</p><p> Daftar Putih hanya mengizinkan tag yang terdaftar dalam kolom Tag Penyaring dan Atribut Penyaring.</p><p>Tanpa HTML akan menyingkirkan semua tag HTML dari konten ketika disimpan.</p><p>Harap diingat bahwa pengaturan ini bekerja tanpa memperhatikan editor apapun yang sedang Anda gunakan. Meskipun Anda menggunakan editor WYSIWYG, pengaturan penapisan mungkin akan memotong tag dan atribut tambahan sebelum menyimpan informasi ke dalam database.</p>"
