COM_INSTALLER_MSG_WARNINGS_JOOMLATMPNOTSET="Direktori sementara Joomla! belum diatur"
COM_INSTALLER_MSG_WARNINGS_JOOMLATMPNOTSETDESC="Direktori sementara Joomla! adalah tempat dimana Joomla! menyalin sebuah ekstensi, mengekstrak berkas-berkas dan esktensi yang disalin ke dalam direktori yang semestinya. Jika konfigurasi ini tidak diatur di configuration.php ($tmp_path) maka Anda tidak akan dapat mengunggah ekstensi. Buatlah direktori untuk mengizinkan Joomla! menulis direktori tersebut untuk memperbaiki permasalahan."
COM_INSTALLER_MSG_WARNINGS_JOOMLATMPNOTWRITEABLE="Direktori sementara Joomla! tidak dapat ditulisi atau belum ada"
COM_INSTALLER_MSG_WARNINGS_JOOMLATMPNOTWRITEABLEDESC="Direktori sementara Joomla! tidak dapat ditulisi oleh Joomla!, atau belum ada, yang akan menyebabkan masalah ketika ingin mengunggah ekstensi ke Joomla!. Jika Anda tidak punya masalah dalam hal mengunggah ekstensi, pastikan Anda telah mendefinisikan keberadaannya di dalam berkas configuration.php atau periksa '%s' dan atur menjadi dapat ditulisi kemudian cek kembali apakah ini sudah bisa memecahkan masalah."
COM_INSTALLER_MSG_WARNINGS_LOWMEMORYDESC="Batas Bawah Memori PHP"
COM_INSTALLER_MSG_WARNINGS_LOWMEMORYWARN="Batas memori PHP Anda di atur dibawah 8MB yang bisa menimbulkan permasalahan ketika Anda memasang ekstensi-ekstensi yang berukuran besar. Silahkan atur ulang batas memori Anda paling tidak 16MB."
COM_INSTALLER_MSG_WARNINGS_MEDMEMORYDESC="Berpotensial Batas Bawah Memori PHP"
COM_INSTALLER_MSG_WARNINGS_MEDMEMORYWARN="Batas memori PHP Anda diatur dibawah 16MB yang mana dapat menimbulkan permasalahan pada saat Anda memasang ekstensi yang berukuran besar. Silahkan atur ulang batas memori Anda paling tidak 16MB."
COM_INSTALLER_MSG_WARNINGS_SMALLPOSTSIZE="Ukuran POST maksimum PHP kecil"
COM_INSTALLER_MSG_WARNINGS_SMALLPOSTSIZEDESC="Ukuran maksimum POST mengatur sejumlah data yang dapat dikirimkan melalui POST ke server. Termasuk ketika Anda memasukkan sebuah artikel, media, (gambar, video) dan ekstensi. Nilai yang kurang dari 2MB berdampak pada saat Anda mengunggah ekstensi yang berukuran besar. Ini diatur di berkas php.ini di post_max_size"
COM_INSTALLER_MSG_WARNINGS_SMALLUPLOADSIZE="Ukuran berkas unggah PHP kecil"
COM_INSTALLER_MSG_WARNINGS_SMALLUPLOADSIZEDESC="Ukuran maksimum berkas untuk diunggah diatur kurang dari 2MB yang mana ini bisa berdampak pada saat Anda mengunggah ekstensi berukuran besar."
COM_INSTALLER_MSG_WARNINGS_UPLOADBIGGERTHANPOST="Ukuran Unggah PHP lebih besar dari ukuran POST"
COM_INSTALLER_MSG_WARNINGS_UPLOADBIGGERTHANPOSTDESC="Nilai upload_max_filesize di berkas php.ini lebih besari daripada variabel post_max_size. Variabel post_max_size akan diutamakan dan akan memblokir permintaan yang lebih besar daripadanya. Umumnya ini adalah kesalahan konfigurasi server ketika ingin meningkatkan ukuran pengunggahan. Silahkan naikkan upload_max_filesize paling tidak sesuai dengan variabel post_max_size atau sebaliknya"
COM_INSTALLER_MSG_WARNINGS_NONE="Tidak ada peringatan yang terdeteksi"
COM_INSTALLER_MSG_WARNINGS_NOTCOMPLETE="<h1>Peringatan: Pengunggahan Belum Selesai!</h1><p>Pembaruan baru sebagian. Silahkan lakukan pembaruan kedua untuk menyelesaikan proses.</p>"
COM_INSTALLER_MSG_WARNINGS_PHPUPLOADNOTSET="Direktori sementara PHP tidak diatur"
COM_INSTALLER_MSG_WARNINGS_PHPUPLOADNOTSETDESC="Direktori sementara PHP adalah direktori yang digunakan PHP untuk menyimpan berkas-berkas yang telah diunggah sebelum diakses oleh Joomla!. Belum mengatur direktori, seharusnya bukan menjadi masalah, jika Anda menemukan permasalahan dimana berkas belum bisa terdeteksi atau berkas-berkas pengunggahannya belum bisa terdeteksi, mengatur ini di berkas php.ini Anda bisa jadi solusi."
COM_INSTALLER_MSG_WARNINGS_PHPUPLOADNOTWRITEABLE="Direktori sementara PHP tidak dapat ditulisi"
COM_INSTALLER_MSG_WARNINGS_PHPUPLOADNOTWRITEABLEDESC="Direktori sementara PHP tidak dapat ditulisi oleh Joomla!, yang mana dapat menimbulkan permasalahan ketika ingin mengunggah ekstensi ke Joomla!. Jika Anda menemukan permasalahan saat mengunggah ekstensi, periksa '%s' dan atur ulang menjadi dapat ditulisi kemudian cek kembali apakah ini sudah bisa memecahkan masalah."
